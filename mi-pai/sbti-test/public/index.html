<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI - 戏谑人格测试</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎭 SBTI</h1>
      <p class="subtitle">戏谑人格测试 - MBTI 已经过时，SBTI 来了</p>
    </header>

    <main id="app">
      <div id="question-container" class="question-card">
        <div class="progress-bar">
          <div id="progress" class="progress-fill"></div>
        </div>
        <div class="progress-text">
          <span id="current-question">1</span> / <span id="total-questions">10</span>
        </div>
        
        <h2 id="question-text" class="question-title"></h2>
        
        <div id="options-container" class="options">
        </div>
      </div>

      <div id="result-container" class="result-card" style="display: none;">
        <div class="result-emoji" id="result-emoji"></div>
        <h2 id="result-title" class="result-title"></h2>
        <div class="result-sbti" id="result-sbti"></div>
        <p id="result-desc" class="result-desc"></p>
        
        <div class="result-actions">
          <button id="restart-btn" class="btn btn-primary">再测一次</button>
          <button id="share-btn" class="btn btn-secondary">分享结果</button>
        </div>
      </div>
    </main>

    <footer>
      <p>🎯 31道题，测出你的隐藏人格类型</p>
      <p class="disclaimer">⚠️ 本测试纯属娱乐，请勿当真</p>
    </footer>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
