<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常记忆系统 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #1a1a2e;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 16px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .stat-card .number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-card .label {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        .section {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: #1a1a2e;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        .timeline-item {
            position: relative;
            padding-bottom: 30px;
            border-left: 2px solid #667eea;
            padding-left: 20px;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 0;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #667eea;
        }
        .timeline-item .date {
            font-size: 14px;
            color: #999;
        }
        .timeline-item .title {
            font-size: 18px;
            color: #1a1a2e;
            margin: 5px 0;
        }
        .timeline-item .desc {
            color: #666;
            font-size: 14px;
        }
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
        }
        .tag.project { background: #e3f2fd; color: #1976d2; }
        .tag.decision { background: #fff3e0; color: #f57c00; }
        .tag.todo { background: #fce4ec; color: #c2185b; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            color: #1a1a2e;
            font-weight: 600;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status.active { background: #e8f5e9; color: #2e7d32; }
        .status.pending { background: #fff3e0; color: #f57c00; }
        .status.done { background: #e3f2fd; color: #1976d2; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .search-box button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .search-box button:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🧠 日常记忆系统 Dashboard</h1>
            <p>工作日志 · 讨论摘要 · 项目追踪 · 智能检索</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="total-logs">0</div>
                <div class="label">📝 工作日志</div>
            </div>
            <div class="stat-card">
                <div class="number" id="total-summaries">0</div>
                <div class="label">💬 讨论摘要</div>
            </div>
            <div class="stat-card">
                <div class="number" id="total-projects">0</div>
                <div class="label">📌 追踪项目</div>
            </div>
            <div class="stat-card">
                <div class="number" id="total-todos">0</div>
                <div class="label">✅ 待办事项</div>
            </div>
        </div>

        <!-- 搜索框 -->
        <div class="section">
            <h2>🔍 快速检索</h2>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索关键词、项目名、日期...">
                <button onclick="search()">搜索</button>
            </div>
        </div>

        <!-- 最近日志 -->
        <div class="section">
            <h2>📅 最近工作日志</h2>
            <div class="timeline" id="recent-logs">
                <div class="timeline-item">
                    <div class="date">暂无数据</div>
                    <div class="title">系统已就绪，等待第一条日志记录</div>
                </div>
            </div>
        </div>

        <!-- 最近讨论 -->
        <div class="section">
            <h2>💬 最近讨论摘要</h2>
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>主题</th>
                        <th>标签</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="recent-summaries">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #999;">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 项目进行 -->
        <div class="section">
            <h2>📌 项目进行追踪</h2>
            <table>
                <thead>
                    <tr>
                        <th>项目名称</th>
                        <th>负责人</th>
                        <th>优先级</th>
                        <th>状态</th>
                        <th>最后更新</th>
                    </tr>
                </thead>
                <tbody id="projects-table">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #999;">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 初始化数据
        function loadData() {
            // 这里会从本地 JSON 文件加载数据
            // 目前显示示例数据
            document.getElementById('total-logs').textContent = '0';
            document.getElementById('total-summaries').textContent = '0';
            document.getElementById('total-projects').textContent = '0';
            document.getElementById('total-todos').textContent = '0';
        }

        function search() {
            const query = document.getElementById('search-input').value;
            alert('搜索功能开发中...\n搜索关键词：' + query);
        }

        // 页面加载时初始化
        loadData();
    </script>
</body>
</html>
