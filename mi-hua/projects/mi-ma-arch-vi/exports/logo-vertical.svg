<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" width="200" height="280">
  <defs>
    <linearGradient id="vertGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  
  <!-- 图形标志 -->
  <g transform="translate(50, 0)">
    <!-- 外框 -->
    <path d="M0 25 L50 5 L100 25 L100 85 L50 105 L0 85 Z" 
          fill="none" 
          stroke="url(#vertGrad)" 
          stroke-width="2"
          stroke-linejoin="round"/>
    
    <!-- 左括号 -->
    <path d="M25 37 L18 42 L18 68 L25 73" 
          fill="none" 
          stroke="#00D4AA" 
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- 右括号 -->
    <path d="M75 37 L82 42 L82 68 L75 73" 
          fill="none" 
          stroke="#00D4AA" 
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- 中心节点 -->
    <circle cx="50" cy="55" r="5" fill="#00D4AA"/>
    
    <!-- 连接线 -->
    <line x1="30" y1="55" x2="45" y2="55" stroke="#6366F1" stroke-width="2"/>
    <line x1="55" y1="55" x2="70" y2="55" stroke="#6366F1" stroke-width="2"/>
    
    <!-- 顶部装饰 -->
    <circle cx="50" cy="12" r="2" fill="#00D4AA" opacity="0.8"/>
    <line x1="50" y1="14" x2="50" y2="20" stroke="#00D4AA" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- 分隔线 -->
  <line x1="30" y1="120" x2="170" y2="120" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- 英文文字 -->
  <text x="100" y="160" 
        font-family="'Space Grotesk', 'Inter', sans-serif" 
        font-size="24" 
        font-weight="600" 
        fill="url(#vertGrad)"
        text-anchor="middle"
        letter-spacing="0.15em">MI-MA-ARCH</text>
  
  <!-- 中文文字 -->
  <text x="100" y="195" 
        font-family="'Noto Sans SC', sans-serif" 
        font-size="16" 
        font-weight="500" 
        fill="#0A1628"
        text-anchor="middle"
        letter-spacing="0.3em">幂码 - 架构</text>
  
  <!-- 职位 -->
  <text x="100" y="225" 
        font-family="'Inter', sans-serif" 
        font-size="11" 
        font-weight="400" 
        fill="#94A3B8"
        text-anchor="middle"
        letter-spacing="0.1em">CHIEF ARCHITECT</text>
  
  <!-- 底部装饰 -->
  <circle cx="85" y="255" r="2" fill="#00D4AA"/>
  <line x1="90" y1="255" x2="110" y2="255" stroke="#00D4AA" stroke-width="1"/>
  <circle cx="115" y="255" r="2" fill="#00D4AA"/>
</svg>