<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  
  <!-- 外框：建筑结构感 -->
  <path d="M10 25 L50 10 L90 25 L90 75 L50 90 L10 75 Z" 
        fill="none" 
        stroke="url(#brandGradient)" 
        stroke-width="2"
        stroke-linejoin="round"/>
  
  <!-- 内部代码括号与电路节点融合 -->
  <!-- 左括号 -->
  <path d="M30 35 L25 40 L25 60 L30 65" 
        fill="none" 
        stroke="#00D4AA" 
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- 右括号 -->
  <path d="M70 35 L75 40 L75 60 L70 65" 
        fill="none" 
        stroke="#00D4AA" 
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- 中心连接节点（电路感） -->
  <circle cx="50" cy="50" r="5" fill="#00D4AA"/>
  
  <!-- 连接线（电路板走线感） -->
  <line x1="35" y1="50" x2="45" y2="50" stroke="#6366F1" stroke-width="1.5"/>
  <line x1="55" y1="50" x2="65" y2="50" stroke="#6366F1" stroke-width="1.5"/>
  
  <!-- 顶部装饰节点 -->
  <circle cx="50" cy="18" r="2" fill="#00D4AA" opacity="0.8"/>
  <line x1="50" y1="20" x2="50" y2="28" stroke="#00D4AA" stroke-width="1" opacity="0.6"/>
</svg>