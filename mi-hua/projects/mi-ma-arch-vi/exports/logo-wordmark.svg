<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
  </defs>
  
  <!-- 英文标识 MI-MA-ARCH -->
  <text x="20" y="50" 
        font-family="'Space Grotesk', 'Inter', sans-serif" 
        font-size="36" 
        font-weight="600" 
        fill="url(#textGradient)"
        letter-spacing="0.15em">MI-MA-ARCH</text>
  
  <!-- 分隔线 -->
  <line x1="280" y1="25" x2="280" y2="55" stroke="#00D4AA" stroke-width="2"/>
  
  <!-- 中文标识 幂码-架构 -->
  <text x="295" y="48" 
        font-family="'Noto Sans SC', 'Source Han Sans', sans-serif" 
        font-size="20" 
        font-weight="500" 
        fill="#0A1628">幂码-架构</text>
  
  <!-- 装饰性下划线 -->
  <path d="M20 62 L380 62" stroke="#00D4AA" stroke-width="1" opacity="0.5"/>
  <circle cx="20" cy="62" r="2" fill="#00D4AA"/>
  <circle cx="380" cy="62" r="2" fill="#00D4AA"/>
</svg>