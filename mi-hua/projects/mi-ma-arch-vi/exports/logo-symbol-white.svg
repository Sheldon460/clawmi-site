<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 白色版本 - 用于深色背景 -->
  
  <!-- 外框：建筑结构感 -->
  <path d="M10 25 L50 10 L90 25 L90 75 L50 90 L10 75 Z" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="2"
        stroke-linejoin="round"/>
  
  <!-- 左括号 -->
  <path d="M30 35 L25 40 L25 60 L30 65" 
        fill="none" 
        stroke="#00D4AA" 
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- 右括号 -->
  <path d="M70 35 L75 40 L75 60 L70 65" 
        fill="none" 
        stroke="#00D4AA" 
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- 中心节点 -->
  <circle cx="50" cy="50" r="5" fill="#00D4AA"/>
  
  <!-- 连接线 -->
  <line x1="35" y1="50" x2="45" y2="50" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="55" y1="50" x2="65" y2="50" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  
  <!-- 顶部装饰节点 -->
  <circle cx="50" cy="18" r="2" fill="#00D4AA" opacity="0.8"/>
  <line x1="50" y1="20" x2="50" y2="28" stroke="#00D4AA" stroke-width="1" opacity="0.6"/>
</svg>