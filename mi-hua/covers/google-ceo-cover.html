<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@100;200;300;400;500&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #0a1628 0%, #1a2a45 50%, #0a1628 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* Subtle pattern overlay */
        .pattern-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        
        /* Golden orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 215, 100, 0.9) 0%, 
                rgba(212, 175, 55, 0.7) 30%, 
                rgba(180, 140, 40, 0.4) 60%, 
                transparent 100%);
            box-shadow: 
                0 0 60px rgba(212, 175, 55, 0.4),
                inset -20px -20px 60px rgba(0,0,0,0.3);
        }
        
        .orb-1 {
            width: 300px;
            height: 300px;
            left: 10%;
            top: 20%;
            opacity: 0.6;
            animation: float-orb 20s ease-in-out infinite;
        }
        
        .orb-2 {
            width: 200px;
            height: 200px;
            right: 15%;
            top: 30%;
            opacity: 0.4;
            animation: float-orb 15s ease-in-out infinite reverse;
        }
        
        .orb-3 {
            width: 150px;
            height: 150px;
            left: 20%;
            bottom: 25%;
            opacity: 0.5;
            animation: float-orb 18s ease-in-out infinite;
        }
        
        .orb-4 {
            width: 100px;
            height: 100px;
            right: 25%;
            bottom: 35%;
            opacity: 0.3;
            animation: float-orb 12s ease-in-out infinite reverse;
        }
        
        @keyframes float-orb {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-30px) translateX(15px); }
            50% { transform: translateY(-15px) translateX(-15px); }
            75% { transform: translateY(-40px) translateX(10px); }
        }
        
        /* Coin stack visualization */
        .coin-stack {
            position: absolute;
            right: 10%;
            bottom: 15%;
            width: 300px;
            height: 400px;
        }
        
        .coin {
            position: absolute;
            width: 200px;
            height: 30px;
            background: linear-gradient(180deg, 
                rgba(255, 215, 100, 0.9) 0%, 
                rgba(212, 175, 55, 0.8) 50%, 
                rgba(180, 140, 40, 0.7) 100%);
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 
                0 4px 20px rgba(0,0,0,0.3),
                inset 0 2px 10px rgba(255,255,255,0.3);
        }
        
        .coin:nth-child(1) { bottom: 0; opacity: 0.9; }
        .coin:nth-child(2) { bottom: 25px; opacity: 0.85; width: 195px; }
        .coin:nth-child(3) { bottom: 50px; opacity: 0.8; width: 190px; }
        .coin:nth-child(4) { bottom: 75px; opacity: 0.75; width: 185px; }
        .coin:nth-child(5) { bottom: 100px; opacity: 0.7; width: 180px; }
        .coin:nth-child(6) { bottom: 125px; opacity: 0.65; width: 175px; }
        .coin:nth-child(7) { bottom: 150px; opacity: 0.6; width: 170px; }
        .coin:nth-child(8) { bottom: 175px; opacity: 0.55; width: 165px; }
        
        /* Digital transformation effect */
        .digital-transform {
            position: absolute;
            right: 15%;
            top: 40%;
            width: 150px;
            height: 150px;
        }
        
        .pixel {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 215, 100, 0.6);
            animation: pixel-float 8s ease-in-out infinite;
        }
        
        @keyframes pixel-float {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.2); }
        }
        
        /* Main content */
        .content {
            position: absolute;
            left: 80px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }
        
        .category {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(212, 175, 55, 0.8);
            margin-bottom: 40px;
        }
        
        .company {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 400;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        
        .amount {
            font-family: 'Playfair Display', serif;
            font-size: 180px;
            font-weight: 600;
            background: linear-gradient(135deg, 
                #ffd700 0%, 
                #d4af37 30%, 
                #ffd700 50%, 
                #b8860b 70%, 
                #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            letter-spacing: -5px;
            text-shadow: 0 0 80px rgba(212, 175, 55, 0.3);
        }
        
        .amount-currency {
            font-size: 72px;
            font-weight: 300;
            vertical-align: super;
            margin-left: 10px;
        }
        
        .subtitle {
            font-size: 24px;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
            margin-top: 30px;
            letter-spacing: 1px;
        }
        
        .executive-name {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(212, 175, 55, 0.7);
            margin-top: 60px;
        }
        
        /* Decorative line */
        .decorative-line {
            position: absolute;
            left: 80px;
            bottom: 80px;
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, 
                rgba(212, 175, 55, 0.8), 
                rgba(212, 175, 55, 0.2));
        }
        
        /* Google colors hint */
        .google-colors {
            position: absolute;
            left: 80px;
            bottom: 100px;
            display: flex;
            gap: 8px;
        }
        
        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.6;
        }
        
        .color-dot:nth-child(1) { background: #4285f4; }
        .color-dot:nth-child(2) { background: #ea4335; }
        .color-dot:nth-child(3) { background: #fbbc05; }
        .color-dot:nth-child(4) { background: #34a853; }
    </style>
</head>
<body>
    <div class="pattern-overlay"></div>
    
    <!-- Golden orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    
    <!-- Coin stack -->
    <div class="coin-stack">
        <div class="coin"></div>
        <div class="coin"></div>
        <div class="coin"></div>
        <div class="coin"></div>
        <div class="coin"></div>
        <div class="coin"></div>
        <div class="coin"></div>
        <div class="coin"></div>
    </div>
    
    <!-- Main content -->
    <div class="content">
        <div class="category">Executive Compensation</div>
        <div class="company">Google</div>
        <div class="amount">692<span class="amount-currency">M</span></div>
        <div class="subtitle">Pay Package Approved</div>
        <div class="executive-name">Sundar Pichai</div>
    </div>
    
    <!-- Decorative elements -->
    <div class="decorative-line"></div>
    <div class="google-colors">
        <div class="color-dot"></div>
        <div class="color-dot"></div>
        <div class="color-dot"></div>
        <div class="color-dot"></div>
    </div>
</body>
</html>
