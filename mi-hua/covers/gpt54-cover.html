<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* Background grid pattern */
        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.5;
        }
        
        /* Central split composition */
        .split-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
        }
        
        /* Left side - Pro (Cool Blue) */
        .left-zone {
            flex: 1;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b3a4b 50%, #2d5a7b 100%);
            position: relative;
            overflow: hidden;
        }
        
        .left-zone::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 70%, rgba(100,200,255,0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        /* Right side - Thinking (Warm Amber) */
        .right-zone {
            flex: 1;
            background: linear-gradient(225deg, #1a1208 0%, #3d2817 50%, #5c3d1e 100%);
            position: relative;
            overflow: hidden;
        }
        
        .right-zone::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 70% 30%, rgba(255,180,80,0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite reverse;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        
        /* Neural network visualization */
        .neural-network {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        .node {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        
        .connection {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform-origin: left center;
        }
        
        /* Central neural brain */
        .brain-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            z-index: 10;
        }
        
        .brain-ring {
            position: absolute;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .brain-ring:nth-child(1) { width: 100%; height: 100%; animation: rotate 20s linear infinite; }
        .brain-ring:nth-child(2) { width: 80%; height: 80%; animation: rotate 15s linear infinite reverse; border-color: rgba(100,200,255,0.3); }
        .brain-ring:nth-child(3) { width: 60%; height: 60%; animation: rotate 10s linear infinite; border-color: rgba(255,180,80,0.3); }
        .brain-ring:nth-child(4) { width: 40%; height: 40%; animation: rotate 8s linear infinite reverse; }
        
        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        /* Data particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.8; }
        }
        
        /* Typography */
        .title-container {
            position: absolute;
            bottom: 120px;
            left: 80px;
            z-index: 20;
        }
        
        .version-label {
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }
        
        .main-title {
            font-size: 120px;
            font-weight: 100;
            letter-spacing: -4px;
            color: rgba(255,255,255,0.95);
            line-height: 1;
        }
        
        .main-title span {
            font-weight: 600;
            background: linear-gradient(90deg, #64c8ff, #ffb450);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            margin-top: 30px;
        }
        
        /* Side labels */
        .side-label {
            position: absolute;
            top: 50%;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            transform: translateY(-50%) rotate(-90deg);
            transform-origin: center;
        }
        
        .side-label.left {
            left: 40px;
        }
        
        .side-label.right {
            right: 40px;
        }
        
        /* Gradient overlay for depth */
        .depth-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="grid-pattern"></div>
    
    <div class="split-container">
        <div class="left-zone"></div>
        <div class="right-zone"></div>
    </div>
    
    <div class="depth-overlay"></div>
    
    <!-- Neural brain center -->
    <div class="brain-center">
        <div class="brain-ring"></div>
        <div class="brain-ring"></div>
        <div class="brain-ring"></div>
        <div class="brain-ring"></div>
    </div>
    
    <!-- Data particles -->
    <div class="particle" style="left: 10%; top: 20%; animation-delay: 0s;"></div>
    <div class="particle" style="left: 20%; top: 60%; animation-delay: 2s;"></div>
    <div class="particle" style="left: 80%; top: 30%; animation-delay: 4s;"></div>
    <div class="particle" style="left: 70%; top: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="left: 30%; top: 80%; animation-delay: 8s;"></div>
    <div class="particle" style="left: 90%; top: 50%; animation-delay: 10s;"></div>
    <div class="particle" style="left: 15%; top: 40%; animation-delay: 12s;"></div>
    <div class="particle" style="left: 85%; top: 80%; animation-delay: 14s;"></div>
    
    <!-- Side labels -->
    <div class="side-label left">Pro Version</div>
    <div class="side-label right">Thinking Version</div>
    
    <!-- Main title -->
    <div class="title-container">
        <div class="version-label">Next Generation AI</div>
        <div class="main-title">GPT-<span>5.4</span></div>
        <div class="subtitle">Autonomous Intelligence Redefined</div>
    </div>
</body>
</html>
