<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* Split background */
        .split-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
        }
        
        /* Left - Institutional/Military side */
        .institutional-side {
            flex: 1;
            background: linear-gradient(180deg, #1a1a1f 0%, #2d2d35 50%, #1a1a1f 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Pentagon silhouette */
        .pentagon {
            position: absolute;
            left: 15%;
            top: 50%;
            transform: translateY(-50%);
            width: 400px;
            height: 400px;
            opacity: 0.15;
        }
        
        .pentagon svg {
            width: 100%;
            height: 100%;
            fill: #4a4a55;
        }
        
        /* Warning overlay */
        .warning-stripe {
            position: absolute;
            width: 100%;
            height: 60px;
            background: repeating-linear-gradient(
                45deg,
                #3d3d35,
                #3d3d35 20px,
                #2a2a30 20px,
                #2a2a30 40px
            );
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.3;
        }
        
        /* Right - AI Energy side */
        .ai-side {
            flex: 1;
            background: linear-gradient(135deg, #1a0a1f 0%, #2d1a3d 50%, #1f0a2a 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Purple energy burst */
        .energy-burst {
            position: absolute;
            right: -200px;
            top: 50%;
            transform: translateY(-50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(ellipse at center, 
                rgba(180, 100, 255, 0.4) 0%, 
                rgba(150, 80, 220, 0.2) 30%, 
                rgba(120, 60, 180, 0.1) 50%, 
                transparent 70%);
            animation: pulse-energy 4s ease-in-out infinite;
        }
        
        @keyframes pulse-energy {
            0%, 100% { transform: translateY(-50%) scale(1); opacity: 0.8; }
            50% { transform: translateY(-50%) scale(1.1); opacity: 1; }
        }
        
        /* Rising graph line */
        .graph-container {
            position: absolute;
            right: 10%;
            top: 30%;
            width: 500px;
            height: 300px;
        }
        
        .graph-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #c084fc, #a855f7);
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.8);
            transform-origin: left center;
        }
        
        .graph-line:nth-child(1) { top: 80%; transform: rotate(-5deg); opacity: 0.3; }
        .graph-line:nth-child(2) { top: 60%; transform: rotate(-15deg); opacity: 0.5; }
        .graph-line:nth-child(3) { top: 40%; transform: rotate(-25deg); opacity: 0.7; }
        .graph-line:nth-child(4) { top: 20%; transform: rotate(-35deg); opacity: 1; }
        
        /* Central dividing line */
        .divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(255,255,255,0.2) 20%, 
                rgba(255,255,255,0.3) 50%, 
                rgba(255,255,255,0.2) 80%, 
                transparent 100%);
            transform: translateX(-50%);
        }
        
        /* Warning alert symbol */
        .alert-symbol {
            position: absolute;
            left: 50%;
            top: 15%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border: 3px solid rgba(255, 200, 100, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: alert-pulse 2s ease-in-out infinite;
        }
        
        .alert-symbol::before {
            content: '!';
            font-size: 40px;
            font-weight: 300;
            color: rgba(255, 200, 100, 0.8);
        }
        
        @keyframes alert-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 200, 100, 0.4); }
            50% { box-shadow: 0 0 30px 10px rgba(255, 200, 100, 0.2); }
        }
        
        /* Main title */
        .title-container {
            position: absolute;
            bottom: 100px;
            left: 80px;
            z-index: 20;
        }
        
        .category-label {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 200, 100, 0.7);
            margin-bottom: 20px;
        }
        
        .main-title {
            font-size: 72px;
            font-weight: 200;
            letter-spacing: -2px;
            color: rgba(255,255,255,0.95);
            line-height: 1.1;
            max-width: 800px;
        }
        
        .main-title span {
            font-weight: 600;
            color: #c084fc;
        }
        
        /* Side statistics */
        .stat-box {
            position: absolute;
            right: 80px;
            bottom: 100px;
            text-align: right;
        }
        
        .stat-number {
            font-size: 96px;
            font-weight: 100;
            color: #c084fc;
            line-height: 1;
            text-shadow: 0 0 40px rgba(192, 132, 252, 0.5);
        }
        
        .stat-label {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }
        
        /* Subtle grid overlay */
        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
        }
        
        /* Claude logo hint */
        .claude-hint {
            position: absolute;
            right: 15%;
            top: 60%;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(192, 132, 252, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .claude-hint::before {
            content: '◈';
            font-size: 40px;
            color: rgba(192, 132, 252, 0.6);
        }
    </style>
</head>
<body>
    <div class="split-bg">
        <div class="institutional-side">
            <!-- Pentagon silhouette -->
            <div class="pentagon">
                <svg viewBox="0 0 100 100">
                    <polygon points="50,5 95,35 80,95 20,95 5,35"/>
                </svg>
            </div>
            <div class="warning-stripe"></div>
        </div>
        <div class="ai-side">
            <div class="energy-burst"></div>
            <div class="graph-container">
                <div class="graph-line"></div>
                <div class="graph-line"></div>
                <div class="graph-line"></div>
                <div class="graph-line"></div>
            </div>
            <div class="claude-hint"></div>
        </div>
    </div>
    
    <div class="divider"></div>
    <div class="grid-overlay"></div>
    
    <!-- Alert symbol -->
    <div class="alert-symbol"></div>
    
    <!-- Main title -->
    <div class="title-container">
        <div class="category-label">Supply Chain Risk</div>
        <div class="main-title">Pentagon vs <span>Anthropic</span></div>
    </div>
    
    <!-- Statistics -->
    <div class="stat-box">
        <div class="stat-number">↑</div>
        <div class="stat-label">User Surge</div>
    </div>
</body>
</html>
