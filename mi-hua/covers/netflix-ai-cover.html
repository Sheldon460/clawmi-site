<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@100;200;300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 817px; /* 2.35:1 aspect ratio */
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a0a 50%, #0a0a0a 100%);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* Cinematic vignette */
        .vignette {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 5;
        }
        
        /* Netflix N logo transformed */
        .netflix-n {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 500px;
            z-index: 10;
        }
        
        .n-stroke {
            position: absolute;
            background: linear-gradient(180deg, #e50914 0%, #b20710 100%);
            box-shadow: 0 0 60px rgba(229, 9, 20, 0.5);
        }
        
        .n-stroke:nth-child(1) {
            width: 80px;
            height: 100%;
            left: 0;
            transform: skewX(-10deg);
        }
        
        .n-stroke:nth-child(2) {
            width: 80px;
            height: 100%;
            right: 0;
            transform: skewX(10deg);
        }
        
        .n-stroke:nth-child(3) {
            width: 100px;
            height: 80%;
            left: 50%;
            top: 10%;
            transform: translateX(-50%) skewX(-20deg);
        }
        
        /* Neural network overlay */
        .neural-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.4;
        }
        
        .neural-node {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(229, 9, 20, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.6);
            animation: pulse-node 3s ease-in-out infinite;
        }
        
        @keyframes pulse-node {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.5); opacity: 1; }
        }
        
        /* Film reel transformation */
        .film-reel {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 4px solid rgba(229, 9, 20, 0.3);
            border-radius: 50%;
            animation: rotate-reel 20s linear infinite;
        }
        
        .film-reel::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg 15deg,
                rgba(229, 9, 20, 0.2) 15deg 30deg,
                transparent 30deg 45deg,
                rgba(229, 9, 20, 0.2) 45deg 60deg,
                transparent 60deg 75deg,
                rgba(229, 9, 20, 0.2) 75deg 90deg,
                transparent 90deg
            );
            border-radius: 50%;
        }
        
        @keyframes rotate-reel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .film-reel-1 {
            left: 10%;
            top: 20%;
            opacity: 0.6;
        }
        
        .film-reel-2 {
            right: 10%;
            bottom: 20%;
            opacity: 0.4;
            animation-direction: reverse;
        }
        
        /* Spotlights */
        .spotlight {
            position: absolute;
            width: 300px;
            height: 600px;
            background: linear-gradient(180deg, 
                rgba(229, 9, 20, 0.15) 0%, 
                rgba(229, 9, 20, 0.05) 50%, 
                transparent 100%);
            clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
            animation: spotlight-sway 8s ease-in-out infinite;
        }
        
        @keyframes spotlight-sway {
            0%, 100% { transform: rotate(-5deg); opacity: 0.6; }
            50% { transform: rotate(5deg); opacity: 0.8; }
        }
        
        .spotlight-1 {
            left: 15%;
            top: 0;
        }
        
        .spotlight-2 {
            right: 15%;
            top: 0;
            animation-delay: 4s;
        }
        
        /* Data streams (AI transformation) */
        .data-stream {
            position: absolute;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                rgba(255, 200, 100, 0.6) 20%, 
                rgba(255, 200, 100, 0.8) 50%, 
                rgba(255, 200, 100, 0.6) 80%, 
                transparent 100%);
            animation: stream-flow 4s ease-in-out infinite;
        }
        
        @keyframes stream-flow {
            0%, 100% { opacity: 0.3; transform: scaleY(0.8); }
            50% { opacity: 0.8; transform: scaleY(1); }
        }
        
        /* Golden film frames */
        .film-frame {
            position: absolute;
            border: 2px solid rgba(255, 200, 100, 0.3);
            box-shadow: 0 0 20px rgba(255, 200, 100, 0.2);
        }
        
        .frame-1 {
            width: 180px;
            height: 100px;
            left: 5%;
            top: 40%;
            transform: rotate(-15deg);
        }
        
        .frame-2 {
            width: 200px;
            height: 120px;
            right: 5%;
            bottom: 30%;
            transform: rotate(10deg);
        }
        
        /* Main title */
        .title-container {
            position: absolute;
            bottom: 60px;
            left: 80px;
            z-index: 20;
        }
        
        .category-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px;
            letter-spacing: 6px;
            color: rgba(229, 9, 20, 0.9);
            margin-bottom: 15px;
        }
        
        .main-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 96px;
            font-weight: 400;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.95);
            line-height: 1;
            text-shadow: 0 0 40px rgba(229, 9, 20, 0.5);
        }
        
        .main-title span {
            color: #e50914;
            text-shadow: 0 0 60px rgba(229, 9, 20, 0.8);
        }
        
        .subtitle {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            text-transform: uppercase;
        }
        
        /* AI badge */
        .ai-badge {
            position: absolute;
            right: 80px;
            bottom: 60px;
            padding: 12px 30px;
            background: linear-gradient(135deg, rgba(229, 9, 20, 0.8), rgba(180, 7, 16, 0.8));
            border: 1px solid rgba(229, 9, 20, 0.5);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.9);
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.4);
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    
    <!-- Spotlights -->
    <div class="spotlight spotlight-1"></div>
    <div class="spotlight spotlight-2"></div>
    
    <!-- Film reels -->
    <div class="film-reel film-reel-1"></div>
    <div class="film-reel film-reel-2"></div>
    
    <!-- Netflix N logo -->
    <div class="netflix-n">
        <div class="n-stroke"></div>
        <div class="n-stroke"></div>
        <div class="n-stroke"></div>
    </div>
    
    <!-- Neural nodes -->
    <div class="neural-layer">
        <div class="neural-node" style="left: 20%; top: 30%; animation-delay: 0s;"></div>
        <div class="neural-node" style="left: 30%; top: 60%; animation-delay: 1s;"></div>
        <div class="neural-node" style="left: 70%; top: 40%; animation-delay: 2s;"></div>
        <div class="neural-node" style="left: 80%; top: 70%; animation-delay: 0.5s;"></div>
        <div class="neural-node" style="left: 15%; top: 80%; animation-delay: 1.5s;"></div>
        <div class="neural-node" style="left: 85%; top: 25%; animation-delay: 2.5s;"></div>
    </div>
    
    <!-- Data streams -->
    <div class="data-stream" style="left: 25%;"></div>
    <div class="data-stream" style="left: 75%; animation-delay: 2s;"></div>
    
    <!-- Film frames -->
    <div class="film-frame frame-1"></div>
    <div class="film-frame frame-2"></div>
    
    <!-- Main title -->
    <div class="title-container">
        <div class="category-label">ACQUISITION</div>
        <div class="main-title">NETFLIX <span>×</span> AI</div>
        <div class="subtitle">Ben Affleck's InterPositive Studio</div>
    </div>
    
    <!-- AI badge -->
    <div class="ai-badge">AI FILMMAKING</div>
</body>
</html>
