<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小红书封面 - 周一职场重启</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #f5f1ed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .xhs-cover {
            width: 900px;
            height: 1200px;
            background: linear-gradient(135deg, #faf8f5 0%, #f0ebe4 100%);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        
        /* 标题区域 */
        .header {
            padding: 60px 50px 30px;
            text-align: center;
        }
        
        .tag {
            display: inline-block;
            background: #a8d5ba;
            color: #2d5a3d;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        
        .title {
            font-size: 56px;
            font-weight: 700;
            color: #3d3d3d;
            line-height: 1.3;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 28px;
            color: #7a7a7a;
            font-weight: 400;
        }
        
        /* 视觉主体区域 */
        .visual {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 50px;
        }
        
        .desk-scene {
            width: 100%;
            height: 400px;
            background: linear-gradient(180deg, #faf8f5 0%, #f5f0e8 100%);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }
        
        /* 装饰元素 */
        .coffee-cup {
            position: absolute;
            bottom: 80px;
            left: 80px;
            width: 100px;
            height: 80px;
            background: linear-gradient(135deg, #e8d5c4 0%, #d4bfa8 100%);
            border-radius: 0 0 50px 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        
        .coffee-cup::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 20px;
            width: 60px;
            height: 20px;
            background: #f5ebe0;
            border-radius: 50%;
        }
        
        .steam {
            position: absolute;
            top: -40px;
            left: 40px;
            width: 20px;
            height: 30px;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, transparent 100%);
            border-radius: 50%;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) opacity(0.6); }
            50% { transform: translateY(-10px) opacity(0.3); }
        }
        
        .notebook {
            position: absolute;
            bottom: 60px;
            right: 100px;
            width: 140px;
            height: 100px;
            background: #faf8f5;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transform: rotate(-5deg);
        }
        
        .notebook::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            width: 2px;
            height: 100%;
            background: #e8e0d5;
        }
        
        .pen {
            position: absolute;
            bottom: 90px;
            right: 70px;
            width: 80px;
            height: 8px;
            background: linear-gradient(90deg, #c9b8a0 0%, #a08b6d 100%);
            border-radius: 4px;
            transform: rotate(30deg);
        }
        
        .plant {
            position: absolute;
            top: 40px;
            right: 60px;
            width: 60px;
            height: 60px;
            background: #a8d5ba;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.8;
        }
        
        .window-light {
            position: absolute;
            top: 0;
            left: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            pointer-events: none;
        }
        
        /* 底部信息 */
        .footer {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, transparent 0%, rgba(168,213,186,0.1) 100%);
        }
        
        .stats {
            display: flex;
            gap: 30px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #4a7c59;
        }
        
        .stat-label {
            font-size: 16px;
            color: #8a9a8a;
        }
        
        .cta-button {
            background: linear-gradient(135deg, #a8d5ba 0%, #8bcba6 100%);
            color: #2d5a3d;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 22px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(168,213,186,0.4);
        }
        
        .brand {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="xhs-cover">
        <!-- 标题区域 -->
        <div class="header">
            <span class="tag">💼 职场效率</span>
            <h1 class="title">周一职场重启<br>效率工具包</h1>
            <p class="subtitle">打工人温柔自救指南 ✨</p>
        </div>
        
        <!-- 视觉主体 -->
        <div class="visual">
            <div class="desk-scene">
                <div class="window-light"></div>
                
                <!-- 装饰元素 -->
                <div class="coffee-cup">
                    <div class="steam"></div>
                </div>
                
                <div class="notebook"></div>
                <div class="pen"></div>
                <div class="plant"></div>
            </div>
        </div>
        
        <!-- 底部信息 -->
        <div class="footer">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">5</div>
                    <div class="stat-label">精品模板</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">21</div>
                    <div class="stat-label">天养成计划</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">10k+</div>
                    <div class="stat-label">人已领取</div>
                </div>
            </div>
            <div class="cta-button">免费领取 👆</div>
        </div>
        
        <div class="brand">@职场效率研究所</div>
    </div>
</body>
</html>
